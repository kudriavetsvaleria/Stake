services:
  postgres:
    image: postgres:17
    container_name: stake-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - stake-postgres-data:/var/lib/postgresql/data

volumes:
  stake-postgres-data:
